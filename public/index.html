<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI 小白进阶日报</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #F0EBE4;
      color: #3D3530;
      min-height: 100vh;
    }
    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }
    .header {
      margin-bottom: 32px;
    }
    .date-badge {
      display: inline-block;
      background: rgba(168,181,160,0.2);
      color: #5A6B52;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .title {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #9A9188;
    }

    .cards {
      display: grid;
      gap: 16px;
      margin-top: 32px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      text-align: left;
      box-shadow: 0 2px 12px rgba(61,53,48,0.06);
      border: 2px solid transparent;
      transition: all .2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(61,53,48,0.1);
    }
    .card.active {
      border-color: #A8B5A0;
      background: #FAFCF9;
    }
    .card-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .card.active .card-badge {
      background: #E8F0E0;
      color: #5A6B52;
    }
    .card.inactive .card-badge {
      background: #F5F0E8;
      color: #9A9188;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: #7A7168;
      line-height: 1.6;
    }
    .card-arrow {
      float: right;
      font-size: 20px;
      color: #B8A99A;
      margin-top: -4px;
    }
    .card.active .card-arrow {
      color: #A8B5A0;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #B8A99A;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="date-badge" id="today-date">--</div>
      <h1 class="title">AI 小白进阶日报</h1>
      <p class="subtitle">每天精选 3 条 AI 新闻，帮你读懂、学会、用上</p>
    </div>

    <div class="cards">
      <a href="daily-brief.html" class="card" id="brief-card">
        <span class="card-arrow">→</span>
        <div class="card-badge" id="brief-badge">今日更新</div>
        <div class="card-title">轻度版 · 早报</div>
        <div class="card-desc">AI 新闻 + 简单分析，3 分钟快速浏览。周一、周三、周四、周六、周日更新。</div>
      </a>

      <a href="deep-dive-news.html" class="card" id="deep-card">
        <span class="card-arrow">→</span>
        <div class="card-badge" id="deep-badge">今日更新</div>
        <div class="card-title">深度版 · 进阶</div>
        <div class="card-desc">新闻 + 知识深潜 + 工具对比 + 洞察，15 分钟完整学习。周二、周五更新。</div>
      </a>
    </div>

    <div class="footer">
      点击带「今日更新」标签的卡片查看最新内容
    </div>
  </div>

  <script>
    const now = new Date();
    const day = now.getDay(); // 0=周日, 1=周一, ..., 6=周六
    const dateStr = now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');
    document.getElementById('today-date').textContent = dateStr + ' ' + ['周日','周一','周二','周三','周四','周五','周六'][day];

    // 轻度版日：周一(1)、周三(3)、周四(4)、周六(6)、周日(0)
    const briefDays = [0, 1, 3, 4, 6];
    // 深度版日：周二(2)、周五(5)
    const deepDays = [2, 5];

    const briefCard = document.getElementById('brief-card');
    const deepCard = document.getElementById('deep-card');
    const briefBadge = document.getElementById('brief-badge');
    const deepBadge = document.getElementById('deep-badge');

    if (briefDays.includes(day)) {
      briefCard.classList.add('active');
      briefBadge.textContent = '今日更新';
      deepCard.classList.add('inactive');
      deepBadge.textContent = '今日休刊';
    } else if (deepDays.includes(day)) {
      deepCard.classList.add('active');
      deepBadge.textContent = '今日更新';
      briefCard.classList.add('inactive');
      briefBadge.textContent = '今日休刊';
    }
  </script>
</body>
</html>
